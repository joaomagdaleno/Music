name: music_tag_editor
description: "A specialized music metadata editor and library manager."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dart_tags: ^0.4.1
  file_picker: ^10.3.10
  http: ^1.2.1
  sqflite: ^2.3.3
  path: ^1.9.0
  archive: ^4.0.9
  permission_handler: ^12.0.1
  shared_preferences: ^2.2.3
  system_tray: ^2.0.3
  window_manager: ^0.5.1
  xml: ^6.6.1
  meta: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  sqflite_common_ffi: ^2.3.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
