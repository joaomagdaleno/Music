name: music_tag_editor
description: A powerful music tag editor built with Flutter and Rust.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_rust_bridge: 2.12.0
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.2
  intl: ^0.20.2
  file_picker: ^8.1.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  window_manager: ^0.5.1
  xml: ^6.6.1
  meta: ^1.11.0
  palette_generator: any
  flutter_spinkit: any
  rust_lib_music_tag_editor:
    path: ./rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"
  build_runner: ^2.4.15
  freezed: ^2.5.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
